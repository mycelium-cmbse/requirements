name: Auto-label RID fields

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issueLabels = context.payload.issue.labels.map(l => l.name);
            if (!issueLabels.includes("rid")) return;
            
            const body = context.payload.issue.body ?? "";

            function extract(heading) {
              const match = body.match(
                new RegExp(`###\\s*${heading}\\s*\\n+([^\\n#]+)`)
              );
              return match ? match[1].trim() : null;
            }
            
            function matchMap(value, map) {
              if (!value) return null;
              const key = Object.keys(map).find(k => value.startsWith(k));
              return key ? map[key] : null;
            }

            const review   = extract("Review");
            const document = extract("Document under review");
            const severity = extract("Severity");
            const category = extract("Category");

            // Map form values → labels
            const reviewMap = {
              "SRR": "review:SRR",
              "PDR": "review:PDR",
              "CDR": "review:CDR",
              "QR":  "review:QR",
              "AR":  "review:AR",
              "ORR": "review:ORR",
            };

            const documentMap = {
              "Software-System-Specification.md (SSS)":   "doc:SSS",
              "Software-Requirements-Specification.md (SRS)":   "doc:SRS",
              "Roles-and-Permissions.md": "doc:roles",
              "Other (specify in Location)": "doc:other",
            };

            const severityMap = {
              "Critical":  "sev:critical",
              "Major":     "sev:major",
              "Minor":     "sev:minor",
              "Editorial": "sev:editorial",
            };

            const categoryMap = {
              "Technical": "cat:technical",
              "Editorial": "cat:editorial",
              "Question / Request for clarification":  "cat:question",
            };

            // Collect matched labels
            const labels = [];
            if (matchMap(review, reviewMap))     labels.push(matchMap(review, reviewMap));
            if (matchMap(document, documentMap)) labels.push(matchMap(document, documentMap));
            if (matchMap(severity, severityMap)) labels.push(matchMap(severity, severityMap));
            if (matchMap(category, categoryMap)) labels.push(matchMap(category, categoryMap));

            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });